name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Check formatting
        shell: bash
        run: |
          files="$(git ls-files '*.go')"
          if [ -n "$files" ]; then
            test -z "$(gofmt -l $files)"
          fi

      - name: Run tests
        run: go test ./...

      - name: Run vet
        run: go vet ./...

      - name: Validate docs
        shell: bash
        run: ./scripts/check_docs.sh
